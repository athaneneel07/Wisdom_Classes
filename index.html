<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisdom Classes | Professional ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; overflow: hidden; }
        .sidebar { background: #0f172a; border-right: 1px solid #1e293b; transition: all 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.4); }
        .nav-active { background: #4f46e5; color: white !important; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
        .loader { border-top-color: #4f46e5; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .view-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-800">

    <!-- LOADING SCREEN -->
    <div id="loadingOverlay" class="fixed inset-0 z-[100] bg-slate-900 flex flex-col items-center justify-center text-white transition-opacity duration-500">
        <div class="loader w-16 h-16 border-4 rounded-full mb-4"></div>
        <p class="font-bold tracking-widest animate-pulse">CONNECTING TO WISDOM DATABASE...</p>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0f172a]">
        <div class="w-full max-w-md p-10 bg-white rounded-[2.5rem] shadow-2xl text-center">
            <div class="w-20 h-20 bg-indigo-600 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-xl">
                <i class="fas fa-school text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-900 mb-2">Wisdom Classes</h1>
            <p class="text-slate-500 mb-8">Management ERP v2.0</p>
            <div class="space-y-4">
                <input type="text" id="uInp" placeholder="Username" class="w-full bg-slate-50 p-4 rounded-2xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                <input type="password" id="pInp" placeholder="Password" class="w-full bg-slate-50 p-4 rounded-2xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition transform active:scale-95 shadow-lg shadow-indigo-200">Sign In</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD STRUCTURE -->
    <div id="appContainer" class="hidden flex h-screen">
        <!-- Sidebar -->
        <aside class="sidebar w-72 flex flex-col p-6 shadow-2xl">
            <div class="flex items-center gap-3 px-4 mb-10">
                <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center text-white font-bold text-xl">W</div>
                <span class="text-white text-xl font-bold tracking-tight">Wisdom ERP</span>
            </div>
            <nav id="sidebarMenu" class="flex-1 space-y-2"></nav>
            <button onclick="location.reload()" class="mt-auto flex items-center gap-3 p-4 text-slate-500 hover:text-red-400 font-bold transition">
                <i class="fas fa-power-off"></i> <span>Sign Out</span>
            </button>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col">
            <header class="h-24 bg-white/80 backdrop-blur-md flex items-center justify-between px-10 border-b border-slate-100 sticky top-0 z-40">
                <div>
                    <h2 class="text-xs font-bold text-indigo-500 uppercase tracking-widest" id="displayRole">ROLE</h2>
                    <h1 class="text-2xl font-bold text-slate-800" id="displayUser">User Name</h1>
                </div>
                <div id="headerActions" class="flex items-center gap-4"></div>
            </header>

            <div id="viewPort" class="flex-1 overflow-y-auto p-10 view-in">
                <!-- Content Loads Here -->
            </div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxrcX4ScLRbrMDeu3DQE1TL_deSA6GdmKCKEZfbIbJmQE3vfCjFh5cPvv_TPTTA3IJqQA/exec";
        let DB = {};
        let user = null;

        // 1. Core Logic
        async function handleLogin() {
            const u = document.getElementById('uInp').value;
            const p = document.getElementById('pInp').value;
            document.getElementById('loadingOverlay').style.opacity = '1';
            document.getElementById('loadingOverlay').classList.remove('hidden');

            try {
                const res = await fetch(API);
                DB = await res.json();
                user = DB.Users.find(row => row.username == u && row.password == p);

                if (user) {
                    initApp();
                } else {
                    alert("Invalid Credentials");
                    document.getElementById('loadingOverlay').classList.add('hidden');
                }
            } catch (e) {
                alert("Database Connection Error. Check Apps Script Deployment.");
            }
        }

        function initApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('loadingOverlay').classList.add('hidden');
            document.getElementById('appContainer').classList.remove('hidden');
            document.getElementById('displayUser').innerText = user.name;
            document.getElementById('displayRole').innerText = user.role;

            renderMenu();
            loadView('Dashboard');
        }

        function renderMenu() {
            const menu = document.getElementById('sidebarMenu');
            const links = [
                { id: 'Dashboard', icon: 'fa-house', roles: ['admin', 'teacher', 'student'] },
                { id: 'Attendance', icon: 'fa-calendar-check', roles: ['admin', 'teacher'] },
                { id: 'Academic Reports', icon: 'fa-chart-pie', roles: ['admin', 'teacher', 'student'] },
                { id: 'Fees & Finance', icon: 'fa-wallet', roles: ['admin', 'student'] },
                { id: 'Teacher Profiles', icon: 'fa-user-tie', roles: ['admin'] },
                { id: 'Student Registry', icon: 'fa-user-plus', roles: ['admin'] },
                { id: 'My Class', icon: 'fa-users', roles: ['teacher', 'student'] }
            ];

            menu.innerHTML = links.filter(l => l.roles.includes(user.role)).map(l => `
                <button onclick="loadView('${l.id}')" class="nav-btn w-full flex items-center gap-4 p-4 rounded-2xl text-slate-400 font-semibold transition hover:text-white">
                    <i class="fas ${l.icon} w-5"></i> <span>${l.id}</span>
                </button>
            `).join('');
        }

        // 2. Views (Covers all image points)
        async function loadView(view) {
            const vp = document.getElementById('viewPort');
            vp.innerHTML = `<div class="flex justify-center mt-20"><div class="loader w-10 h-10 border-4 rounded-full"></div></div>`;
            
            // Highlight active button
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.toggle('nav-active', b.innerText.includes(view));
            });

            if (view === 'Dashboard') {
                vp.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                        <div class="glass p-8 rounded-[2rem] shadow-sm">
                            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Active Students</p>
                            <h3 class="text-4xl font-bold mt-2">${DB.Users.filter(u=>u.role=='student').length}</h3>
                        </div>
                        <div class="glass p-8 rounded-[2rem] shadow-sm">
                            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Pending Fees</p>
                            <h3 class="text-4xl font-bold mt-2 text-red-500">₹42K</h3>
                        </div>
                        <div class="glass p-8 rounded-[2rem] shadow-sm">
                            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Total Staff</p>
                            <h3 class="text-4xl font-bold mt-2 text-indigo-600">${DB.Staff_Profiles.length}</h3>
                        </div>
                        <div class="glass p-8 rounded-[2rem] shadow-sm bg-indigo-600 text-white">
                            <p class="opacity-70 text-[10px] font-bold uppercase tracking-widest">Next Class</p>
                            <h3 class="text-2xl font-bold mt-2">10:30 AM</h3>
                            <p class="text-xs opacity-80">Grade 10 - Physics</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                        <div class="glass p-8 rounded-[2rem]">
                            <h3 class="text-xl font-bold mb-6 flex items-center gap-3"><i class="fas fa-bullhorn text-indigo-500"></i> Active Notices</h3>
                            <div class="space-y-4">
                                ${DB.Notices.map(n => `
                                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                        <p class="text-[10px] font-bold text-indigo-500 mb-1">${n.date}</p>
                                        <h4 class="font-bold text-slate-800">${n.title}</h4>
                                        <p class="text-sm text-slate-500 mt-1">${n.content || 'Please attend the meeting in Room 4.'}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="glass p-8 rounded-[2rem] flex flex-col justify-center items-center text-center">
                            <h3 class="text-xl font-bold mb-2">Monthly Growth Report</h3>
                            <p class="text-slate-400 text-sm mb-6 italic">Primarily Student Enrollment Data</p>
                            <div class="flex items-end gap-3 h-40">
                                <div class="w-10 bg-indigo-100 h-20 rounded-t-lg"></div>
                                <div class="w-10 bg-indigo-300 h-32 rounded-t-lg"></div>
                                <div class="w-10 bg-indigo-600 h-40 rounded-t-lg"></div>
                                <div class="w-10 bg-indigo-400 h-28 rounded-t-lg"></div>
                            </div>
                        </div>
                    </div>
                `;
            }

            if (view === 'Attendance') {
                vp.innerHTML = `
                    <div class="glass rounded-[2.5rem] overflow-hidden shadow-sm">
                        <div class="p-8 border-b border-slate-100 flex justify-between items-center">
                            <h3 class="font-bold text-xl">Daily Attendance Panel</h3>
                            <span class="text-xs bg-indigo-50 text-indigo-600 px-4 py-2 rounded-full font-bold">BATCH: GRADE 10-A</span>
                        </div>
                        <table class="w-full text-left">
                            <thead class="bg-slate-50"><tr class="text-[10px] font-bold uppercase tracking-widest text-slate-400">
                                <th class="p-6">Student Name</th><th class="p-6">Current Batch</th><th class="p-6 text-center">Action</th>
                            </tr></thead>
                            <tbody>
                                ${DB.Users.filter(u=>u.role=='student').map(s => `
                                    <tr class="border-b border-slate-50">
                                        <td class="p-6 font-bold text-slate-800">${s.name}</td>
                                        <td class="p-6 text-slate-500 font-medium">${s.batch}</td>
                                        <td class="p-6 flex justify-center gap-3">
                                            <button onclick="logAttendance('${s.name}', 'Present')" class="px-5 py-2 bg-emerald-50 text-emerald-600 rounded-xl text-xs font-bold hover:bg-emerald-600 hover:text-white transition">Present</button>
                                            <button onclick="logAttendance('${s.name}', 'Absent')" class="px-5 py-2 bg-red-50 text-red-600 rounded-xl text-xs font-bold hover:bg-red-600 hover:text-white transition">Absent</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }

            if (view === 'Teacher Profiles') {
                vp.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        ${DB.Staff_Profiles.map(t => `
                            <div class="glass p-8 rounded-[2.5rem] text-center shadow-sm">
                                <div class="w-20 h-20 bg-slate-100 rounded-full mx-auto mb-4 flex items-center justify-center text-2xl font-bold text-indigo-600">
                                    ${t.name.charAt(0)}
                                </div>
                                <h4 class="text-xl font-bold">${t.name}</h4>
                                <p class="text-indigo-500 text-xs font-bold uppercase tracking-widest mb-4">${t.assignedClasses}</p>
                                <hr class="mb-4">
                                <div class="flex justify-between text-sm mb-2"><span>Monthly Salary:</span><span class="font-bold">₹${t.salary}</span></div>
                                <div class="flex justify-between text-sm"><span>Status:</span><span class="text-emerald-500 font-bold">${t.status}</span></div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            if (view === 'Student Registry') {
                vp.innerHTML = `
                    <div class="max-w-2xl mx-auto glass p-10 rounded-[3rem] shadow-xl">
                        <h3 class="text-2xl font-bold mb-8 flex items-center gap-3"><i class="fas fa-user-plus text-indigo-600"></i> New Registration</h3>
                        <div class="grid grid-cols-2 gap-6">
                            <input id="rName" type="text" placeholder="Full Name" class="p-4 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-100 focus:ring-2 focus:ring-indigo-600 outline-none">
                            <input id="rBatch" type="text" placeholder="Batch Allotment" class="p-4 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-100 focus:ring-2 focus:ring-indigo-600 outline-none">
                            <input id="rUser" type="text" placeholder="Set Username" class="p-4 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-100 focus:ring-2 focus:ring-indigo-600 outline-none">
                            <input id="rPass" type="password" placeholder="Set Password" class="p-4 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-100 focus:ring-2 focus:ring-indigo-600 outline-none">
                        </div>
                        <button onclick="saveStudent()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold mt-8 shadow-xl hover:bg-black transition">Complete Enrollment</button>
                    </div>
                `;
            }
        }

        // 3. Actions
        async function logAttendance(name, status) {
            alert(`SMS ALERT: Parent of ${name} notified of ${status} status.`);
            await fetch(API, {
                method: 'POST',
                body: JSON.stringify({ sheet: 'Attendance', data: [new Date().toLocaleDateString(), name, status, 'B1'] })
            });
            alert("Entry saved in Cloud database.");
        }

        async function saveStudent() {
            const row = [
                document.getElementById('rUser').value,
                document.getElementById('rPass').value,
                document.getElementById('rName').value,
                'student',
                document.getElementById('rBatch').value
            ];
            await fetch(API, { method: 'POST', body: JSON.stringify({ sheet: 'Users', data: row }) });
            alert("Registration Successful!");
            location.reload();
        }
    </script>
</body>
</html>
