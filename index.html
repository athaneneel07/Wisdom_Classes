<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisdom Classes | Professional ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; overflow: hidden; }
        .sidebar { background: #0f172a; transition: 0.3s; }
        .nav-link { color: #94a3b8; border-radius: 12px; margin-bottom: 4px; transition: 0.2s; cursor: pointer; }
        .nav-link:hover, .nav-link.active { background: #6366f1; color: #fff; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3); }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 24px; transition: 0.3s; }
        .loader { border-top-color: #6366f1; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .view-animate { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex h-screen">

    <!-- LOADER -->
    <div id="loader" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center">
        <div class="loader w-16 h-16 border-4 border-slate-200 rounded-full mb-4"></div>
        <p class="font-bold text-slate-500 tracking-widest animate-pulse">WISDOM ERP SYNCING...</p>
    </div>

    <!-- LOGIN -->
    <div id="loginPage" class="fixed inset-0 z-50 bg-[#0f172a] flex items-center justify-center hidden">
        <div class="w-full max-w-md p-10 bg-white rounded-[2rem] shadow-2xl text-center">
            <div class="w-20 h-20 bg-indigo-600 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-xl shadow-indigo-200">
                <i class="fas fa-graduation-cap text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black mb-2">Wisdom Classes</h1>
            <p class="text-slate-400 mb-8">Premium Education Portal</p>
            <div class="space-y-4">
                <input type="text" id="uInp" placeholder="Username" class="w-full bg-slate-50 p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                <input type="password" id="pInp" placeholder="Password" class="w-full bg-slate-50 p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                <button onclick="login()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 transition active:scale-95 shadow-lg shadow-indigo-100">Sign In</button>
            </div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar w-72 h-full p-6 flex flex-col hidden">
        <div class="flex items-center gap-3 px-4 mb-10">
            <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center font-bold text-white">W</div>
            <span class="text-white text-xl font-extrabold tracking-tight">Wisdom</span>
        </div>
        <nav id="navMenu" class="flex-1 overflow-y-auto"></nav>
        <button onclick="location.reload()" class="mt-auto p-4 text-slate-500 hover:text-red-400 font-bold flex items-center gap-3 transition">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </aside>

    <!-- CONTENT AREA -->
    <main id="mainContent" class="flex-1 flex flex-col hidden">
        <header class="h-24 bg-white border-b flex items-center justify-between px-10">
            <div>
                <p id="roleLabel" class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">Role</p>
                <h1 id="userLabel" class="text-2xl font-extrabold">Name</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right"><p id="batchLabel" class="text-xs font-bold text-slate-400">Batch</p></div>
                <div id="avatar" class="w-12 h-12 bg-indigo-100 rounded-2xl flex items-center justify-center font-black text-indigo-600 border-2 border-white shadow-sm">U</div>
            </div>
        </header>
        <div id="viewBox" class="flex-1 overflow-y-auto p-10 view-animate"></div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxrcX4ScLRbrMDeu3DQE1TL_deSA6GdmKCKEZfbIbJmQE3vfCjFh5cPvv_TPTTA3IJqQA/exec";
        let DB = {};
        let user = null;

        window.onload = async () => {
            try {
                const res = await fetch(SCRIPT_URL);
                DB = await res.json();
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('loginPage').classList.remove('hidden');
            } catch(e) { alert("Failed to connect to Google Sheets."); }
        };

        function login() {
            const u = document.getElementById('uInp').value;
            const p = document.getElementById('pInp').value;
            user = DB.Users.find(x => x.username == u && x.password == p);
            if(user) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('userLabel').innerText = user.name;
                document.getElementById('roleLabel').innerText = user.role;
                document.getElementById('batchLabel').innerText = user.batch;
                document.getElementById('avatar').innerText = user.name.charAt(0);
                renderMenu();
                loadView('Dashboard');
            } else { alert("Invalid login."); }
        }

        function renderMenu() {
            const menu = document.getElementById('navMenu');
            const links = [
                { id: 'Dashboard', icon: 'fa-house', roles: ['admin', 'teacher', 'student'] },
                { id: 'Attendance', icon: 'fa-user-check', roles: ['admin', 'teacher', 'student'] },
                { id: 'Marks & Reports', icon: 'fa-chart-line', roles: ['admin', 'teacher', 'student'] },
                { id: 'Fees & Payment', icon: 'fa-wallet', roles: ['admin', 'student'] },
                { id: 'Teachers', icon: 'fa-chalkboard-teacher', roles: ['admin', 'student'] },
                { id: 'Time Table', icon: 'fa-clock', roles: ['admin', 'teacher', 'student'] },
                { id: 'Registry', icon: 'fa-user-plus', roles: ['admin'] },
                { id: 'Friends', icon: 'fa-users', roles: ['student'] }
            ];
            menu.innerHTML = links.filter(l => l.roles.includes(user.role)).map(l => `
                <div onclick="loadView('${l.id}')" class="nav-link flex items-center gap-4 p-4 font-bold text-sm">
                    <i class="fas ${l.icon} w-5"></i> ${l.id}
                </div>
            `).join('');
        }

        async function loadView(view) {
            const box = document.getElementById('viewBox');
            box.innerHTML = `<div class="flex justify-center mt-20"><div class="loader w-10 h-10 border-4 rounded-full"></div></div>`;
            
            document.querySelectorAll('.nav-link').forEach(l => l.classList.toggle('active', l.innerText.includes(view)));

            if(view === 'Dashboard') {
                box.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                        <div class="glass-card p-8"><p class="text-xs font-bold text-slate-400 uppercase mb-2">My Attendance</p><h3 class="text-4xl font-black">92%</h3></div>
                        <div class="glass-card p-8"><p class="text-xs font-bold text-slate-400 uppercase mb-2">Pending Fees</p><h3 class="text-4xl font-black text-red-500">₹4,200</h3></div>
                        <div class="glass-card p-8 bg-indigo-600 text-white"><p class="text-xs font-bold opacity-70 uppercase mb-2">Next Class</p><h3 class="text-2xl font-black">Math @ 10:30 AM</h3></div>
                    </div>
                    <div class="glass-card p-8">
                        <h3 class="text-xl font-bold mb-6"><i class="fas fa-bullhorn text-indigo-500 mr-2"></i> System Notices</h3>
                        <div class="space-y-4">${DB.Notices.map(n => `<div class="p-4 bg-slate-50 rounded-2xl"><p class="text-[10px] font-black text-indigo-500 uppercase">${n.date}</p><h4 class="font-bold">${n.title}</h4><p class="text-sm text-slate-500">${n.content}</p></div>`).join('')}</div>
                    </div>
                `;
            }

            if(view === 'Attendance') {
                if(user.role === 'student') {
                    const logs = DB.Attendance.filter(a => a.studentName === user.name);
                    box.innerHTML = `<div class="glass-card p-10"><h3 class="text-2xl font-bold mb-6 text-center">Your Monthly Log</h3>
                        <div class="grid grid-cols-1 gap-3">${logs.map(l => `<div class="flex justify-between p-4 bg-slate-50 rounded-xl"><span>${l.date}</span><span class="font-bold text-indigo-600">${l.status}</span></div>`).join('')}</div>
                    </div>`;
                } else {
                    box.innerHTML = `<div class="glass-card overflow-hidden"><table class="w-full text-left">
                        <thead class="bg-slate-50 font-bold text-xs uppercase text-slate-400"><tr><th class="p-6">Student</th><th class="p-6 text-center">Actions</th></tr></thead>
                        <tbody>${DB.Users.filter(u=>u.role=='student').map(s => `<tr class="border-b">
                            <td class="p-6 font-bold">${s.name}</td>
                            <td class="p-6 flex justify-center gap-2">
                                <button onclick="markAtt('${s.name}', 'Present')" class="px-4 py-2 bg-emerald-50 text-emerald-600 rounded-lg text-xs font-bold hover:bg-emerald-600 hover:text-white transition">Present</button>
                                <button onclick="markAtt('${s.name}', 'Absent')" class="px-4 py-2 bg-red-50 text-red-600 rounded-lg text-xs font-bold hover:bg-red-600 hover:text-white transition">Absent</button>
                            </td></tr>`).join('')}</tbody></table></div>`;
                }
            }

            if(view === 'Marks & Reports') {
                const marks = DB.Marks.filter(m => user.role === 'admin' ? true : m.studentName === user.name);
                box.innerHTML = `<div class="glass-card overflow-hidden"><table class="w-full text-left">
                    <thead class="bg-slate-50 font-bold text-xs text-slate-400"><tr><th class="p-6">Student</th><th class="p-6">Subject</th><th class="p-6 text-right">Score</th></tr></thead>
                    <tbody>${marks.map(m => `<tr class="border-b"><td class="p-6 font-bold">${m.studentName}</td><td class="p-6">${m.subject}</td><td class="p-6 text-right font-black text-indigo-600">${m.score}/${m.total}</td></tr>`).join('')}</tbody></table></div>`;
            }

            if(view === 'Fees & Payment') {
                if(user.role === 'student') {
                    const f = DB.Fees.find(x => x.studentName === user.name) || {totalAmount: 0, paidAmount: 0, status: 'Pending'};
                    box.innerHTML = `<div class="max-w-md mx-auto glass-card p-10 text-center"><h3 class="text-3xl font-black mb-10">Payment Track</h3>
                        <div class="space-y-4 mb-10 text-left">
                            <div class="flex justify-between"><span>Total Fees:</span><span class="font-bold">₹${f.totalAmount}</span></div>
                            <div class="flex justify-between"><span>Paid:</span><span class="text-emerald-500 font-bold">₹${f.paidAmount}</span></div>
                            <div class="flex justify-between text-xl font-black border-t pt-4"><span>Balance:</span><span class="text-red-500">₹${f.totalAmount - f.paidAmount}</span></div>
                        </div>
                        <button class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">Proceed to Pay</button></div>`;
                } else {
                    box.innerHTML = `<div class="glass-card overflow-hidden"><table class="w-full text-left">
                        <thead class="bg-slate-50 font-bold text-xs text-slate-400"><tr><th class="p-6">Student</th><th class="p-6">Paid</th><th class="p-6">Action</th></tr></thead>
                        <tbody>${DB.Fees.map(f => `<tr class="border-b"><td class="p-6 font-bold">${f.studentName}</td><td class="p-6">₹${f.paidAmount}</td>
                        <td class="p-6"><button onclick="collectFee('${f.studentName}')" class="text-indigo-600 font-bold">Collect Fee</button></td></tr>`).join('')}</tbody></table></div>`;
                }
            }

            if(view === 'Teachers') {
                box.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    ${DB.Staff_Profiles.map(t => `<div class="glass-card p-8 text-center">
                        <div class="w-16 h-16 bg-slate-100 rounded-full mx-auto mb-4 flex items-center justify-center font-bold text-indigo-600">${t.name.charAt(0)}</div>
                        <h4 class="font-bold text-lg">${t.name}</h4><p class="text-xs text-slate-400 mb-4 font-bold uppercase">${t.assignedClasses}</p>
                        ${user.role === 'admin' ? `<hr class="my-4"><div class="flex justify-between text-sm"><span>Salary Tracking:</span><span class="font-bold">₹${t.salary}</span></div>` : ''}
                    </div>`).join('')}</div>`;
            }

            if(view === 'Time Table') {
                const sched = DB.Schedule.filter(s => user.role === 'student' ? s.batch === user.batch : true);
                box.innerHTML = `<div class="glass-card overflow-hidden"><table class="w-full text-left">
                    <thead class="bg-slate-50 font-bold text-xs text-slate-400"><tr><th class="p-6">Day</th><th class="p-6">Time</th><th class="p-6">Subject</th><th class="p-6">Batch</th></tr></thead>
                    <tbody>${sched.map(s => `<tr class="border-b"><td class="p-6 font-bold">${s.day}</td><td class="p-6">${s.time}</td><td class="p-6 font-bold text-indigo-600">${s.subject}</td><td class="p-6 text-slate-400 font-bold">${s.batch}</td></tr>`).join('')}</tbody></table></div>`;
            }

            if(view === 'Registry') {
                box.innerHTML = `<div class="max-w-xl mx-auto glass-card p-10"><h3 class="text-2xl font-black mb-8">New Student Registration</h3>
                    <div class="space-y-4">
                        <input id="rN" type="text" placeholder="Full Name" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
                        <input id="rB" type="text" placeholder="Batch Allotment" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
                        <input id="rU" type="text" placeholder="Assign Username" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
                        <input id="rP" type="password" placeholder="Assign Password" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
                        <button onclick="register()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold mt-4 shadow-lg shadow-indigo-100">Complete Enrollment</button>
                    </div></div>`;
            }

            if(view === 'Friends') {
                const batchmates = DB.Users.filter(u => u.batch === user.batch && u.username !== user.username);
                box.innerHTML = `<div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    ${batchmates.map(f => `<div class="glass-card p-6 text-center">
                        <div class="w-12 h-12 bg-indigo-50 rounded-full mx-auto mb-3 flex items-center justify-center font-bold text-indigo-600">${f.name.charAt(0)}</div>
                        <h4 class="font-bold text-sm">${f.name}</h4><p class="text-[10px] text-slate-400 font-bold uppercase">${f.batch}</p>
                    </div>`).join('')}</div>`;
            }
        }

        async function markAtt(name, stat) {
            alert(`SMS ALERT: Sent to parents for ${name} being ${stat}.`);
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ sheet: 'Attendance', data: [new Date().toLocaleDateString(), name, stat, user.batch] }) });
            alert("Attendance Logged.");
        }

        async function register() {
            const data = [document.getElementById('rU').value, document.getElementById('rP').value, document.getElementById('rN').value, 'student', document.getElementById('rB').value];
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ sheet: 'Users', data: data }) });
            alert("Student Registered in Database.");
            location.reload();
        }

        async function collectFee(name) {
            const amt = prompt("Enter New Total Paid Amount for " + name);
            if(!amt) return;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "updateFee", sheet: 'Fees', name: name, amount: amt }) });
            alert("Fee Record Updated.");
            location.reload();
        }
    </script>
</body>
</html>
